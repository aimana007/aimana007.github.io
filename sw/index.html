<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Needs a cool name</title>
  <meta name="description" content="A simple, privacy-friendly job application tracker.">
  <style>
    :root{
      color-scheme: light;
      /* Base palette */
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#64748b;         /* slate */
      --accent-strong:#475569;  /* darker slate */
      --border:#e5e7eb;
      --danger:#dc2626;
      --radius:12px;
      --radius-sm:10px;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 12px rgba(0,0,0,.05);
      --shadow-focus: 0 0 0 3px rgba(100,116,139,.18);

      /* Secondary text / links / chips / badges */
      --text-secondary:#374151;
      --link:#0b5ed7;
      --chip-bg:#f1f5f9;
      --chip-fg:#334155;
      --chip-hover:#e2e8f0;
      --badge-stale-bg:#fee2e2;
      --badge-stale-fg:#991b1b;
      --badge-ok-bg:#dcfce7;
      --badge-ok-fg:#166534;
      --tag-pill-bg:#eef2ff;
      --tag-pill-fg:#3730a3;

      /* Button sizing */
      --btn-h: 38px;
      --btn-w: 116px;

      /* CTA brand colors */
      --add-bg:#10b981;        /* emerald-500 */
      --add-bg-hover:#059669;  /* emerald-600 */
      --export-bg:#3b82f6;     /* blue-500 */
      --export-bg-hover:#2563eb;/* blue-600 */
      --import-bg:#a855f7;     /* purple-500 */
      --import-bg-hover:#7c3aed;/* purple-600 */

      /* Status accent colors (left borders) */
      --clr-strongmatch:#06b6d4; /* cyan-500 */
      --clr-prospect:#6366f1;    /* indigo-500 */
      --clr-unlikely:#94a3b8;    /* slate-400 */
      --clr-applied:#10b981;     /* emerald-500 */
      --clr-interview:#22c55e;   /* green-500 */
      --clr-offer:#f59e0b;       /* amber-500 */
      --clr-accepted:#16a34a;    /* green-600 */
      --clr-rejected:#ef4444;    /* red-500 */
      --clr-ghosted:#8b5cf6;     /* violet-500 */
      --clr-withdrawn:#f97316;   /* orange-500 */
      --clr-declined:#fb7185;    /* rose-400 */
    }

    @media (prefers-color-scheme: dark){
      :root:not([data-theme="light"]){
        color-scheme: dark;
        --bg:#0f172a;
        --card:#1e293b;
        --text:#e2e8f0;
        --muted:#94a3b8;
        --accent:#94a3b8;
        --accent-strong:#cbd5e1;
        --border:#334155;
        --text-secondary:#cbd5e1;
        --link:#60a5fa;
        --chip-bg:#1e293b;
        --chip-fg:#cbd5e1;
        --chip-hover:#334155;
        --badge-stale-bg:rgba(239,68,68,.18);
        --badge-stale-fg:#fca5a5;
        --badge-ok-bg:rgba(34,197,94,.18);
        --badge-ok-fg:#86efac;
        --tag-pill-bg:rgba(99,102,241,.18);
        --tag-pill-fg:#c7d2fe;
      }
    }
    :root[data-theme="dark"]{
      color-scheme: dark;
      --bg:#0f172a;
      --card:#1e293b;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --accent:#94a3b8;
      --accent-strong:#cbd5e1;
      --border:#334155;
      --text-secondary:#cbd5e1;
      --link:#60a5fa;
      --chip-bg:#1e293b;
      --chip-fg:#cbd5e1;
      --chip-hover:#334155;
      --badge-stale-bg:rgba(239,68,68,.18);
      --badge-stale-fg:#fca5a5;
      --badge-ok-bg:rgba(34,197,94,.18);
      --badge-ok-fg:#86efac;
      --tag-pill-bg:rgba(99,102,241,.18);
      --tag-pill-fg:#c7d2fe;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:var(--bg);
      line-height:1.45;
      font-size:16px;
    }
    .container{ max-width:1200px; margin: 24px auto 80px; padding:0 16px; }

    /* Toolbar */
    .toolbar{
      display:flex; flex-direction:column; gap:12px;
      margin-bottom:16px; padding:14px 16px;
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .toolbar-main{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .title{ display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
    .title h1{ font-size:1.1rem; margin:0; }
    .logo{ height:120px; width:120px; display:block; }
    .logo-dark{ display:none; }
    @media (prefers-color-scheme: dark){
      :root:not([data-theme="light"]) .logo-light{ display:none; }
      :root:not([data-theme="light"]) .logo-dark{ display:block; }
    }
    :root[data-theme="dark"] .logo-light{ display:none; }
    :root[data-theme="dark"] .logo-dark{ display:block; }

    .toolbar-actions{ display:flex; flex-direction:column; align-items:flex-start; gap:10px; }
    .filters{ display:flex; flex-direction:column; width:100%; max-width:100%; gap:8px; }
    .action-buttons{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .search{ position:relative; width:100%; }
    .search input[type="search"]{
      width:100%; padding:10px 12px 10px 34px; border:1px solid var(--border);
      background:var(--card); color:var(--text); border-radius:var(--radius-sm); outline:none;
      height: var(--btn-h);
    }
    .search input[type="search"]:focus{ box-shadow: var(--shadow-focus) }
    .search svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); pointer-events:none; }

    select, input[type="text"], input[type="url"], input[type="date"], textarea{
      width:100%; padding:10px 12px; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:var(--radius-sm); outline:none;
    }
    select{ height: var(--btn-h); }
    select:focus, input:focus, textarea:focus{ box-shadow: var(--shadow-focus) }
    .status-control{ display:flex; align-items:center; gap:8px; }
    .status-control select{ flex:1; }
    textarea{ resize:vertical }

    #sort{
      width:100%;
      max-width:100%;
    }
    .sort-row{ display:flex; align-items:center; gap:10px; }
    .sort-row #sort{ flex:1; }

    .stats-panel{
      margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);
      display:flex; flex-wrap:wrap; gap:20px;
    }
    .stat{ display:flex; flex-direction:column; gap:2px; }
    .stat-value{ font-size:1.15rem; font-weight:650; }
    .stat-label{ font-size:.8rem; color:var(--muted); }
    .stats-caveat{ font-size:.78rem; color:var(--muted); width:100%; margin-top:4px; }

    .tag-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .tag-filter-row{ margin-bottom:16px; }
    .tag-chip{
      display:inline-flex; align-items:center; gap:4px;
      font-size:.78rem; padding:3px 10px; border-radius:999px;
      background:var(--chip-bg); color:var(--chip-fg); border:1px solid var(--border);
      cursor:pointer; font-weight:500;
    }
    .tag-chip:hover{ background:var(--chip-hover); }
    .tag-chip.active{ background:var(--accent-strong); color:var(--bg); border-color:transparent; }
    .tags-row{ display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .tag-pill{ font-size:.72rem; padding:1px 8px; border-radius:999px; background:var(--tag-pill-bg); color:var(--tag-pill-fg); font-weight:500; }

    .archive-bar{ margin-top:10px; font-size:.85rem; color:var(--muted); display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; }
    .archive-bar button{ border:none; background:transparent; color:var(--accent-strong); font-weight:600; cursor:pointer; padding:0; font-size:.85rem; }
    .archive-bar button:hover{ text-decoration:underline; }
    .archived-section{
      margin-top:12px; padding:10px;
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .archived-section h2{ font-size:.95rem; margin:2px 4px 10px; color:var(--muted); }

    /* Buttons */
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--card); color:var(--text); cursor:pointer; text-decoration:none;
      transition: background .15s ease, border-color .15s ease, transform .02s ease-in-out, box-shadow .15s ease;
      height: var(--btn-h); line-height:1; font-weight:500;
    }
    .btn:hover{ background:var(--chip-hover) }
    .btn:active{ transform: translateY(1px) }
    .btn-cta{
      width: var(--btn-w);
      border-color: transparent;
      color:#fff;
      font-weight:600;
    }
    .btn-cta svg{ display:block }
    .btn-add{ background: var(--add-bg); }
    .btn-add:hover{ background: var(--add-bg-hover); }
    .btn-export{ background: var(--export-bg); }
    .btn-export:hover{ background: var(--export-bg-hover); }
    .btn-import{ background: var(--import-bg); }
    .btn-import:hover{ background: var(--import-bg-hover); }

    @media (max-width: 520px){
      .btn-cta{ width: auto; flex: 1 1 auto; }
      .action-buttons{ gap:8px; }
    }

    .btn-danger{ background:var(--badge-stale-bg); color:var(--badge-stale-fg); }
    .btn-danger:hover{ filter:brightness(0.93); }
    .btn-ghost{ background:transparent; }
    .btn.icon-only span{ display:none }

    /* Board */
    .board{ display:grid; gap:16px; }
    @media(min-width: 1200px){ .board{ grid-template-columns: repeat(4, minmax(0,1fr)); } }
    @media(max-width:1199px){ .board{ grid-template-columns: repeat(3, minmax(0,1fr)); } }
    @media(max-width:920px){ .board{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media(max-width:600px){ .board{ grid-template-columns: 1fr; } }

    .col{
      display:flex; flex-direction:column; gap:10px;
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:10px; min-height:120px;
    }
    .col.drag-over{ outline: 2px dashed var(--accent); outline-offset: -6px; background:var(--chip-hover); }
    .col-body:empty::after{ content:"Drop here"; display:block; color:var(--muted); text-align:center; padding:16px 0; font-size:.9rem; }
    .col-header{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2px 4px 6px; border-bottom:1px dashed var(--border); }
    .col-title{ display:flex; align-items:center; gap:8px; font-weight:600; }
    .count{ font-size:.8rem; padding:2px 8px; border-radius:999px; background:var(--chip-bg); color:var(--chip-fg); }
    .col-actions{ display:flex; align-items:center; gap:6px; }

    .col-body{ padding-top:6px; }

    .stack{ position:relative; padding-bottom:6px; }
    .stack-item{
      display:block; width:100%;
      text-align:left;
      background:var(--card);
      border:1px solid var(--border);
      border-left:4px solid transparent;
      border-radius:10px;
      box-shadow: 0 1px 1px rgba(0,0,0,.04), 0 6px 14px rgba(0,0,0,.06);
      padding:10px 12px;
      margin-top:-16px;
      position:relative;
      z-index:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:var(--text);
      cursor:pointer;
    }
    .stack-item[draggable="true"], .app-card[draggable="true"]{ cursor: grab; }
    .stack-item[aria-grabbed="true"], .app-card[aria-grabbed="true"]{ cursor: grabbing; }
    .stack-item:first-child{ margin-top:0 }
    .stack-item:hover{ transform: translateY(-1px); }
    .stack-item:focus{ outline:none; box-shadow: var(--shadow-focus); }
    .stack-item[data-status="Strong match"]   { border-left-color: var(--clr-strongmatch); }
    .stack-item[data-status="Prospect"]       { border-left-color: var(--clr-prospect); }
    .stack-item[data-status="Unlikely match"] { border-left-color: var(--clr-unlikely); }
    .stack-item[data-status="Applied"]        { border-left-color: var(--clr-applied); }
    .stack-item[data-status="Interviewing"]   { border-left-color: var(--clr-interview); }
    .stack-item[data-status="Offer"]          { border-left-color: var(--clr-offer); }
    .stack-item[data-status="Accepted"]       { border-left-color: var(--clr-accepted); }
    .stack-item[data-status="Rejected"]       { border-left-color: var(--clr-rejected); }
    .stack-item[data-status="Ghosted"]        { border-left-color: var(--clr-ghosted); }
    .stack-item[data-status="Withdrawn"]      { border-left-color: var(--clr-withdrawn); }
    .stack-item[data-status="Declined"]       { border-left-color: var(--clr-declined); }

    .app-card{
      background:var(--card); border:1px solid var(--border); border-left:4px solid transparent;
      border-radius:12px; box-shadow:var(--shadow); padding:12px; margin-bottom:10px;
    }
    .app-card[data-status="Strong match"]   { border-left-color: var(--clr-strongmatch); }
    .app-card[data-status="Prospect"]       { border-left-color: var(--clr-prospect); }
    .app-card[data-status="Unlikely match"] { border-left-color: var(--clr-unlikely); }
    .app-card[data-status="Applied"]        { border-left-color: var(--clr-applied); }
    .app-card[data-status="Interviewing"]   { border-left-color: var(--clr-interview); }
    .app-card[data-status="Offer"]          { border-left-color: var(--clr-offer); }
    .app-card[data-status="Accepted"]       { border-left-color: var(--clr-accepted); }
    .app-card[data-status="Rejected"]       { border-left-color: var(--clr-rejected); }
    .app-card[data-status="Ghosted"]        { border-left-color: var(--clr-ghosted); }
    .app-card[data-status="Withdrawn"]      { border-left-color: var(--clr-withdrawn); }
    .app-card[data-status="Declined"]       { border-left-color: var(--clr-declined); }

    .app-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .app-title{ font-weight:650; }
    .role{ color:var(--text-secondary); font-weight:500; }
    .meta{ color:var(--muted); font-size:.9rem; margin-top:2px; }
    .note{ margin-top:8px; color:var(--text); }
    .next-action{ margin-top:6px; font-size:.9rem; color:var(--accent-strong); font-weight:500; }
    .link{ color:var(--link); text-decoration:none; }
    .link:hover{ text-decoration:underline }

    /* Last-contacted badges */
    .badge-stale{
      display:inline-flex; align-items:center; gap:4px;
      font-size:.72rem; padding:2px 8px; border-radius:999px;
      background:var(--badge-stale-bg); color:var(--badge-stale-fg); font-weight:600; white-space:nowrap;
    }
    .badge-ok{
      display:inline-flex; align-items:center; gap:4px;
      font-size:.72rem; padding:2px 8px; border-radius:999px;
      background:var(--badge-ok-bg); color:var(--badge-ok-fg); font-weight:600; white-space:nowrap;
    }

    .icon-btn{ border:none; background:transparent; cursor:pointer; color:var(--muted); display:inline-flex; align-items:center; border-radius:8px; padding:6px; }
    .icon-btn:hover{ background:var(--chip-hover); color:var(--text) }
    .nowrap{ white-space:nowrap }

    .empty{ display:none; text-align:center; color:var(--muted); padding:28px 8px 8px; }
    .footnote{ margin-top:10px; font-size:.85rem; color:var(--muted); }
    .footnote-bar{ margin-top:10px; font-size:.85rem; color:var(--muted); display:flex; align-items:center; justify-content:space-between; }
    .footnote-bar p{ margin:0; }
    .shortcuts-legend{ margin:8px 0 0; font-size:.8rem; color:var(--muted); }
    .shortcuts-legend kbd{
      display:inline-block; min-width:1.4em; padding:1px 6px; text-align:center;
      font-family:inherit; font-size:.85em; font-weight:600; color:var(--chip-fg);
      background:var(--chip-bg); border:1px solid var(--border); border-radius:5px;
      box-shadow:0 1px 0 var(--border);
    }

    dialog.modal{ width:min(760px, 96vw); border:none; padding:0; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,.22); background:var(--card); color:var(--text); }
    dialog::backdrop{ background: rgba(15,23,42,.45); backdrop-filter: blur(2px); }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); background:var(--card); border-top-left-radius: var(--radius); border-top-right-radius: var(--radius); }
    .modal-title{ margin:0; font-size:1.1rem; }
    .modal-body{ padding:16px 18px }
    .modal-footer{ padding:14px 18px 18px; display:flex; gap:10px; justify-content:flex-end; border-top:1px solid var(--border); background:var(--card); border-bottom-left-radius: var(--radius); border-bottom-right-radius: var(--radius); }

    .grid{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    .grid .full{ grid-column: 1 / -1 }
    .field label{ display:block; margin: 6px 0 6px; font-size:.9rem; color:var(--text-secondary); font-weight:600; }
    .req{ color:#ef4444; margin-left:2px }

    @media (max-width: 760px){
      .toolbar-main{ flex-direction:column; align-items:stretch }
      .toolbar-actions{ width:100%; }
      .grid{ grid-template-columns: 1fr }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div class="toolbar-main">
        <div class="title">
          <img class="logo logo-light" src="lightbg.png" alt="blklogo">
          <img class="logo logo-dark" src="darkbg.png" alt="whtlogo">
        </div>
        <div class="toolbar-actions">
          <div class="filters">
            <div class="search">
              <input id="search" type="search" placeholder="Keyword Filter" aria-label="Search applications">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="#94a3b8" stroke-width="1.5"></circle>
                <path d="M20 20l-3.5-3.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"></path>
              </svg>
            </div>
            <div class="sort-row">
              <select id="sort" aria-label="Sort">
                <option value="date_desc">Newest first</option>
                <option value="date_asc">Oldest first</option>
                <option value="company_asc">Company A–Z</option>
                <option value="company_desc">Company Z–A</option>
                <option value="contact_asc">Needs follow-up first</option>
                <option value="nextaction_asc">Next action first</option>
              </select>
              <span id="followupCount" class="badge-ok" title="Applications needing follow-up" style="display:none"></span>
            </div>
            <div class="action-buttons">
              <button id="addBtn" class="btn btn-cta btn-add" title="Add a new application" aria-label="Add a new application">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                Add
              </button>
              <button id="statsBtn" class="btn" title="Show response-rate stats" aria-label="Show stats" aria-expanded="false">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20V10m7 10V4m7 16v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
                Stats
              </button>
              <button id="themeToggleBtn" class="btn icon-only" title="Toggle dark mode" aria-label="Toggle dark mode">
                <svg id="themeToggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"></svg>
                <span>Theme</span>
              </button>
              <button id="exportJsonBtn" class="btn btn-cta btn-export" title="Download a backup" aria-label="Export applications">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                Export
              </button>
              <label for="importJsonInput" class="btn btn-cta btn-import" title="Import from a backup" aria-label="Import applications" style="cursor:pointer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 21V9m0 0l4 4m-4-4L8 13M4 3h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                Import
                <input id="importJsonInput" type="file" accept="application/json" hidden="">
              </label>
            </div>
          </div>
        </div>
      </div>
      <div id="statsPanel" class="stats-panel" style="display:none"></div>
    </div>

    <div id="tagFilterRow" class="tag-row tag-filter-row" style="display:none"></div>

    <div id="board" class="board" aria-live="polite"></div>
    <p id="emptyState" class="empty" style="display: none;">No applications yet. Click <b>Add</b> to create your first entry.</p>
    <div id="archiveBar" class="archive-bar" style="display:none"></div>
    <div id="archivedSection" class="archived-section" style="display:none"></div>
    <div class="footnote-bar">
      <p>Everything stays in your browser's local storage on this device. Nothing is sent anywhere.</p>
      <button id="clearDataBtn" class="btn btn-danger">Clear data</button>
    </div>
    <p class="shortcuts-legend"><kbd>n</kbd> New application &nbsp;·&nbsp; <kbd>/</kbd> Search &nbsp;·&nbsp; <kbd>Esc</kbd> Close dialog</p>
  </div>

  <!-- Add / Edit Modal -->
  <dialog id="entryModal" class="modal" aria-labelledby="modalTitle" aria-modal="true">
    <form id="entryForm" method="dialog">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Add application</div>
        <button type="button" class="icon-btn" id="closeModalBtn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="grid">
          <div class="field">
            <label for="companyInput">Company<span class="req">*</span></label>
            <input id="companyInput" type="text" placeholder="e.g., Acme Corp" required="">
          </div>
          <div class="field">
            <label for="roleInput">Role / Position<span class="req">*</span></label>
            <input id="roleInput" type="text" placeholder="e.g., Data Scientist" required="">
          </div>
          <div class="field">
            <label for="locationInput">Location</label>
            <input id="locationInput" type="text" placeholder="e.g., Remote · NYC · London">
          </div>
          <div class="field">
            <label for="dateInput">Date recorded</label>
            <input id="dateInput" type="date">
          </div>
          <div class="field">
            <label for="lastContactedInput">Last contacted</label>
            <input id="lastContactedInput" type="date">
          </div>
          <div class="field">
            <label for="statusInput">Status</label>
            <div class="status-control">
              <select id="statusInput"><option value="Strong match">Strong match</option><option value="Prospect">Prospect</option><option value="Unlikely match">Unlikely match</option><option value="Applied">Applied</option><option value="Interviewing">Interviewing</option><option value="Offer">Offer</option><option value="Accepted">Accepted</option><option value="Rejected">Rejected</option><option value="Ghosted">Ghosted</option><option value="Withdrawn">Withdrawn</option><option value="Declined">Declined</option><option value="__add_status__">Add status…</option></select>
            </div>
          </div>
          <div class="field">
            <label for="linkInput">Link (job post / tracker)</label>
            <input id="linkInput" type="url" placeholder="https://example.com/job">
          </div>
          <div class="field">
            <label for="contactNameInput">Contact name</label>
            <input id="contactNameInput" type="text" placeholder="e.g., Jane Doe">
          </div>
          <div class="field">
            <label for="contactInfoInput">Contact info</label>
            <input id="contactInfoInput" type="text" placeholder="Email or LinkedIn URL">
          </div>
          <div class="field">
            <label for="nextActionDateInput">Next action date</label>
            <input id="nextActionDateInput" type="date">
          </div>
          <div class="field">
            <label for="nextActionNoteInput">Next action note</label>
            <input id="nextActionNoteInput" type="text" placeholder="e.g., Phone screen 2pm">
          </div>
          <div class="field">
            <label for="salaryInput">Salary / comp</label>
            <input id="salaryInput" type="text" placeholder="e.g., $120k–140k or £65k">
          </div>
          <div class="field full">
            <label for="tagsInput">Tags</label>
            <input id="tagsInput" type="text" placeholder="e.g., remote, referral, cold-app">
            <div id="tagSuggestions" class="tag-row"></div>
          </div>
          <div class="field full">
            <label for="notesInput">Notes</label>
            <textarea id="notesInput" rows="4" placeholder="Add details, follow-ups…"></textarea>
          </div>
        </div>
        <input id="editId" type="hidden">
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-cta btn-add" id="saveEntryBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 7l-9 9-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          Save
        </button>
        <button type="button" class="btn" id="cancelEntryBtn">Cancel</button>
      </div>
    </form>
  </dialog>

  <script>
  (function(){
    "use strict";

    const LS_KEY = "jobApplications.v1";
    const SORT_KEY = "jobApplications.sort.v1";
    const COL_STATE_KEY = "jobApplications.columnsCollapsed.v1";
    const CUSTOM_STATUS_KEY = "jobApplications.customStatuses.v1";
    const THEME_KEY = "jobApplications.theme.v1";

    // How many days without contact before a card is flagged as needing follow-up.
    // Tweak this number if 14 days is too aggressive or too lax for your search.
    const STALE_DAYS = 14;
    const TERMINAL_STATUSES = ["Rejected", "Withdrawn", "Declined", "Accepted", "Ghosted"];

    // Statuses that count as "the company responded" once reached, for the response-rate stat.
    const RESPONSE_STATUSES = ["Interviewing", "Offer", "Accepted"];
    // Pre-application research stages excluded from the "total applications" stat.
    const PRE_APPLICATION_STATUSES = ["Strong match", "Prospect", "Unlikely match"];

    // How many days a terminal-status card sits untouched before it's eligible to auto-archive.
    const ARCHIVE_DAYS = 60;

    // Curated starter tags relevant to job searching. Users can type any other tag too —
    // anything currently in use across items also shows up as a suggestion/filter chip.
    const DEFAULT_TAGS = ["remote", "hybrid", "onsite", "referral", "cold-app", "recruiter-outreach", "dream-job"];

    const DEFAULT_STATUSES = [
      "Strong match","Prospect","Unlikely match","Applied","Interviewing","Offer","Accepted","Rejected","Ghosted","Withdrawn","Declined"
    ];
    const ADD_STATUS_VALUE = "__add_status__";
    let lastStatusSelection = "";

    let customStatuses = [];
    let customStatusLookup = {};

    let items = [];
    let collapsed = {};
    let activeTagFilters = new Set();
    let showArchived = false;

    const els = {
      board: document.getElementById("board"),
      empty: document.getElementById("emptyState"),
      search: document.getElementById("search"),
      sort: document.getElementById("sort"),
      addBtn: document.getElementById("addBtn"),
      exportJsonBtn: document.getElementById("exportJsonBtn"),
      importJsonInput: document.getElementById("importJsonInput"),
      clearDataBtn: document.getElementById("clearDataBtn"),
      followupCount: document.getElementById("followupCount"),
      statsBtn: document.getElementById("statsBtn"),
      statsPanel: document.getElementById("statsPanel"),
      themeToggleBtn: document.getElementById("themeToggleBtn"),
      themeToggleIcon: document.getElementById("themeToggleIcon"),
      tagFilterRow: document.getElementById("tagFilterRow"),
      archiveBar: document.getElementById("archiveBar"),
      archivedSection: document.getElementById("archivedSection"),
      modal: document.getElementById("entryModal"),
      form: document.getElementById("entryForm"),
      modalTitle: document.getElementById("modalTitle"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      cancelEntryBtn: document.getElementById("cancelEntryBtn"),
      companyInput: document.getElementById("companyInput"),
      roleInput: document.getElementById("roleInput"),
      locationInput: document.getElementById("locationInput"),
      dateInput: document.getElementById("dateInput"),
      lastContactedInput: document.getElementById("lastContactedInput"),
      statusInput: document.getElementById("statusInput"),
      linkInput: document.getElementById("linkInput"),
      contactNameInput: document.getElementById("contactNameInput"),
      contactInfoInput: document.getElementById("contactInfoInput"),
      nextActionDateInput: document.getElementById("nextActionDateInput"),
      nextActionNoteInput: document.getElementById("nextActionNoteInput"),
      salaryInput: document.getElementById("salaryInput"),
      tagsInput: document.getElementById("tagsInput"),
      tagSuggestions: document.getElementById("tagSuggestions"),
      notesInput: document.getElementById("notesInput"),
      editId: document.getElementById("editId"),
    };

    load();
    initTheme();
    initUI();
    render();

    function effectiveTheme(){
      const stored = localStorage.getItem(THEME_KEY);
      if(stored === "light" || stored === "dark") return stored;
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyThemeIcon(theme){
      if(!els.themeToggleIcon) return;
      els.themeToggleIcon.innerHTML = theme === "dark"
        ? '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>'
        : '<circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>';
    }

    function initTheme(){
      const stored = localStorage.getItem(THEME_KEY);
      if(stored === "light" || stored === "dark"){
        document.documentElement.setAttribute("data-theme", stored);
      }
      applyThemeIcon(effectiveTheme());
      els.themeToggleBtn.addEventListener("click", () => {
        const next = effectiveTheme() === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem(THEME_KEY, next);
        applyThemeIcon(next);
      });
    }

    function migrateDateField(arr){
      return arr.map(it => {
        if(it && typeof it === "object"){
          if(it.recordedDate === undefined) it.recordedDate = it.appliedDate || "";
          delete it.appliedDate;
          if(it.lastContactedAt === undefined) it.lastContactedAt = "";
          if(it.nextActionDate === undefined) it.nextActionDate = "";
          if(it.nextActionNote === undefined) it.nextActionNote = "";
          if(it.contactName === undefined) it.contactName = "";
          if(it.contactInfo === undefined) it.contactInfo = "";
          if(it.firstRespondedAt === undefined) it.firstRespondedAt = "";
          if(it.salary === undefined) it.salary = "";
          if(!Array.isArray(it.tags)) it.tags = [];
        }
        return it;
      });
    }

    function load(){
      loadCustomStatuses();
      try{
        const raw = localStorage.getItem(LS_KEY);
        items = raw ? JSON.parse(raw) : [];
        if(!Array.isArray(items)) items = [];
      }catch(e){ items = []; }
      items = migrateDateField(items);
      items = items.map(it => {
        if(it && typeof it === "object"){
          it.status = normalizeStatus(it.status, { allowCreate: true, skipCollapseSave: true });
        }
        return it;
      });
      try{
        const cs = localStorage.getItem(COL_STATE_KEY);
        collapsed = cs ? JSON.parse(cs) : {};
      }catch(e){ collapsed = {}; }
      for(const s of getStatusList()){
        if(typeof collapsed[s] !== "boolean") collapsed[s] = true;
      }
      refreshStatusOptions();
    }
    function save(){ localStorage.setItem(LS_KEY, JSON.stringify(items)); }
    function saveColState(){ localStorage.setItem(COL_STATE_KEY, JSON.stringify(collapsed)); }

    function clearData(){
      const ok = confirm("Are you sure you want to clear your local data? This will permanently delete your stuff. You might want to export your data first, with the export button at the top of the page.");
      if(!ok) return;
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(COL_STATE_KEY);
      localStorage.removeItem(SORT_KEY);
      localStorage.removeItem(CUSTOM_STATUS_KEY);
      items = [];
      collapsed = {};
      customStatuses = [];
      customStatusLookup = {};
      for(const s of getStatusList()){ collapsed[s] = true; }
      els.sort.value = "date_desc";
      refreshStatusOptions("Applied");
      render();
    }

    function initUI(){
      const savedSort = localStorage.getItem(SORT_KEY) || "date_desc";
      els.sort.value = savedSort;

      els.search.addEventListener("input", debounce(render, 120));
      els.sort.addEventListener("change", () => { localStorage.setItem(SORT_KEY, els.sort.value); render(); });

      els.addBtn.addEventListener("click", () => openModal());
      els.cancelEntryBtn.addEventListener("click", closeModal);
      els.closeModalBtn.addEventListener("click", closeModal);
      els.form.addEventListener("submit", onSave);
      els.tagsInput.addEventListener("input", renderTagSuggestions);
      els.tagSuggestions.addEventListener("click", (ev) => {
        const chip = ev.target.closest(".tag-chip");
        if(!chip) return;
        toggleTagInInput(chip.getAttribute("data-tag"));
      });
      if(els.statusInput){
        els.statusInput.addEventListener("focus", () => {
          lastStatusSelection = els.statusInput.value;
        });
        els.statusInput.addEventListener("change", () => {
          if(els.statusInput.value === ADD_STATUS_VALUE){
            const result = promptForStatus();
            if(typeof result === "string" && result){
              refreshStatusOptions(result);
              els.statusInput.value = result;
              lastStatusSelection = result;
            }else{
              refreshStatusOptions(lastStatusSelection);
            }
          }else{
            lastStatusSelection = els.statusInput.value;
          }
        });
      }

      els.exportJsonBtn.addEventListener("click", exportJSON);
      els.importJsonInput.addEventListener("change", importJSON);
      els.clearDataBtn.addEventListener("click", clearData);
      els.statsBtn.addEventListener("click", toggleStats);

      els.board.addEventListener("click", onBoardClick);
      els.archivedSection.addEventListener("click", onBoardClick);

      els.archiveBar.addEventListener("click", (ev) => {
        if(!ev.target.closest("[data-archive-toggle]")) return;
        showArchived = !showArchived;
        render();
      });

      els.tagFilterRow.addEventListener("click", (ev) => {
        const chip = ev.target.closest(".tag-chip");
        if(!chip) return;
        const tag = chip.getAttribute("data-tag");
        if(activeTagFilters.has(tag)) activeTagFilters.delete(tag);
        else activeTagFilters.add(tag);
        render();
      });

      els.dateInput.value = todayISO();

      document.addEventListener("keydown", (ev) => {
        if(ev.ctrlKey || ev.metaKey || ev.altKey) return;
        const tag = (ev.target.tagName || "").toLowerCase();
        const isEditable = tag === "input" || tag === "textarea" || tag === "select" || ev.target.isContentEditable;
        if(isEditable) return;
        if(ev.key === "n" || ev.key === "N"){
          ev.preventDefault();
          openModal();
        }else if(ev.key === "/"){
          ev.preventDefault();
          els.search.focus();
        }
      });
    }

    function onBoardClick(ev){
      const toggle = ev.target.closest("[data-col-toggle]");
      if(toggle){
        const status = toggle.getAttribute("data-col-toggle");
        collapsed[status] = !collapsed[status];
        saveColState();
        render();
        return;
      }
      const delBtn = ev.target.closest(".btn-delete");
      if(delBtn){
        const card = delBtn.closest("[data-id]");
        if(!card) return;
        const id = card.getAttribute("data-id");
        const ok = confirm("Delete this entry?");
        if(!ok) return;
        const idx = items.findIndex(x => x.id === id);
        if(idx >= 0){ items.splice(idx,1); save(); render(); }
        return;
      }
      const editBtn = ev.target.closest(".btn-edit");
      if(editBtn){
        const card = editBtn.closest("[data-id]");
        if(!card) return;
        const id = card.getAttribute("data-id");
        const entry = items.find(x => x.id === id);
        if(entry) openModal(entry);
        return;
      }
      const stackItem = ev.target.closest(".stack-item");
      if(stackItem){
        const id = stackItem.getAttribute("data-id");
        const entry = items.find(x => x.id === id);
        if(entry) openModal(entry);
        return;
      }
    }

    function render(){
      const q = (els.search.value || "").trim().toLowerCase();
      const sortBy = els.sort.value;

      let list = items.slice();

      if(q){
        list = list.filter(it => includes(it.company, q) || includes(it.role, q) || includes(it.location, q) || includes(it.status, q) || includes(it.notes, q) || (it.tags||[]).some(t => includes(t, q)));
      }
      if(activeTagFilters.size){
        list = list.filter(it => Array.from(activeTagFilters).every(t => (it.tags||[]).includes(t)));
      }

      const sorters = {
        "date_desc": (a,b) => (b.recordedDate||"").localeCompare(a.recordedDate||""),
        "date_asc":  (a,b) => (a.recordedDate||"").localeCompare(b.recordedDate||""),
        "company_asc":  (a,b) => (a.company||"").localeCompare(b.company||""),
        "company_desc": (a,b) => (b.company||"").localeCompare(a.company||""),
        "contact_asc": (a,b) => (a.lastContactedAt||"0000-00-00").localeCompare(b.lastContactedAt||"0000-00-00"),
        "nextaction_asc": (a,b) => (a.nextActionDate||"9999-99-99").localeCompare(b.nextActionDate||"9999-99-99"),
      };
      const sorter = sorters[sortBy] || sorters["date_desc"];
      list.sort(sorter);

      const activeList = [];
      const archivedList = [];
      for(const it of list){
        (isArchivable(it) ? archivedList : activeList).push(it);
      }

      const groups = Object.create(null);
      const statusList = getStatusList();
      for(const s of statusList) groups[s] = [];
      for(const it of activeList){
        const s = normalizeStatus(it.status);
        if(!groups[s]) groups[s] = [];
        groups[s].push(it);
      }

      const orderedStatuses = statusList.slice();
      for(const key of Object.keys(groups)){
        if(!orderedStatuses.includes(key)) orderedStatuses.push(key);
      }

      els.board.innerHTML = "";

      const total = list.length;
      if(total === 0){
        if(items.length && q){
          els.empty.textContent = "No applications match your search.";
        }else{
          els.empty.innerHTML = "No applications yet. Click <b>Add</b> to create your first entry.";
        }
        els.empty.style.display = "block";
      }else{
        els.empty.style.display = "none";
      }

      for(const status of orderedStatuses){
        const arr = groups[status] || [];
        if(arr.length === 0) continue;

        const col = document.createElement("section");
        col.className = "col";
        col.setAttribute("data-status", status);
        col.setAttribute("aria-label", status + " column");

        const header = document.createElement("div");
        header.className = "col-header";
        header.innerHTML = `
          <div class="col-title">
            <span>${status}</span>
            <span class="count" aria-label="Count">${arr.length}</span>
          </div>
          <div class="col-actions">
            <button class="icon-btn" data-col-toggle="${status}" title="${collapsed[status] ? "Expand" : "Collapse"} this column" aria-label="${collapsed[status] ? "Expand" : "Collapse"} ${status} column">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                ${collapsed[status]
                  ? '<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
                  : '<path d="M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'}
              </svg>
            </button>
          </div>`;
        col.appendChild(header);

        const body = document.createElement("div");
        body.className = "col-body";
        body.setAttribute("data-status", status);
        wireDropZone(col, status);

        if(collapsed[status]){
          const stack = document.createElement("div");
          stack.className = "stack";
          for(const it of arr){
            stack.appendChild(stackItemEl(it, status));
          }
          body.appendChild(stack);
        }else{
          for(const it of arr){
            body.appendChild(appCardEl(it, status));
          }
        }

        col.appendChild(body);
        els.board.appendChild(col);
      }

      renderTagFilterRow();
      renderArchiveBar(archivedList);
      renderFollowupCount();
      renderStats();
    }

    function stackItemEl(it, status){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "stack-item";
      btn.setAttribute("data-id", it.id);
      btn.setAttribute("data-status", status);
      btn.setAttribute("title", (it.company||"") + (it.role ? " — " + it.role : ""));
      btn.textContent = it.company || "—";
      makeDraggable(btn, it.id);
      return btn;
    }

    function appCardEl(it, status){
      const card = document.createElement("article");
      card.className = "app-card";
      card.setAttribute("data-id", it.id);
      card.setAttribute("data-status", status);
      card.innerHTML = `
        <div class="app-head">
          <div class="app-title">
            <span>${escapeHTML(it.company || "—")}</span>
            <span class="role">— ${escapeHTML(it.role || "—")}</span>
          </div>
          <div class="app-actions nowrap">
            ${staleBadgeHTML(it)}
            <button type="button" class="icon-btn btn-edit" title="Edit entry" aria-label="Edit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 20h4L18.5 9.5a2.828 2.828 0 10-4-4L4 16v4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button type="button" class="icon-btn btn-delete" title="Delete entry" aria-label="Delete">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="meta">
          ${it.recordedDate ? `<span>Recorded: ${escapeHTML(it.recordedDate)}</span>` : ""}
          ${it.lastContactedAt ? ` · <span>Last contact: ${escapeHTML(it.lastContactedAt)}</span>` : ""}
          ${it.location ? ` · <span>${escapeHTML(it.location)}</span>` : ""}
          ${it.salary ? ` · <span>${escapeHTML(it.salary)}</span>` : ""}
          ${it.contactName || it.contactInfo ? ` · <span>Contact: ${escapeHTML([it.contactName, it.contactInfo].filter(Boolean).join(" · "))}</span>` : ""}
          ${it.link ? ` · <a class="link" href="${escapeAttr(it.link)}" target="_blank" rel="noopener noreferrer">Open</a>` : ""}
        </div>
        ${nextActionHTML(it)}
        ${tagsHTML(it)}
        ${it.notes ? `<div class="note">${escapeHTML(it.notes)}</div>` : ""}
      `;
      makeDraggable(card, it.id);
      return card;
    }

    function daysSince(dateStr){
      if(!dateStr) return null;
      const d = new Date(dateStr + "T00:00:00");
      if(isNaN(d.getTime())) return null;
      const diff = Date.now() - d.getTime();
      return Math.floor(diff / (1000*60*60*24));
    }

    function daysBetween(fromStr, toStr){
      if(!fromStr || !toStr) return null;
      const from = new Date(fromStr + "T00:00:00");
      const to = new Date(toStr + "T00:00:00");
      if(isNaN(from.getTime()) || isNaN(to.getTime())) return null;
      return Math.floor((to.getTime() - from.getTime()) / (1000*60*60*24));
    }

    function isStale(it){
      if(TERMINAL_STATUSES.includes(it.status)) return false;
      const days = daysSince(it.lastContactedAt);
      return days === null || days >= STALE_DAYS;
    }

    function isArchivable(it){
      if(!TERMINAL_STATUSES.includes(normalizeStatus(it.status))) return false;
      const days = daysSince((it.lastUpdated || "").slice(0, 10));
      return days !== null && days >= ARCHIVE_DAYS;
    }

    function renderFollowupCount(){
      if(!els.followupCount) return;
      const count = items.filter(isStale).length;
      if(count > 0){
        els.followupCount.textContent = count + " need" + (count===1?"s":"") + " follow-up";
        els.followupCount.style.display = "inline-flex";
      }else{
        els.followupCount.style.display = "none";
      }
    }

    function nextActionHTML(it){
      if(!it.nextActionDate && !it.nextActionNote) return "";
      const parts = [it.nextActionNote, it.nextActionDate].filter(Boolean).map(escapeHTML);
      return `<div class="next-action">Next: ${parts.join(" · ")}</div>`;
    }

    function tagsHTML(it){
      if(!it.tags || !it.tags.length) return "";
      return `<div class="tags-row">${it.tags.map(t => `<span class="tag-pill">${escapeHTML(t)}</span>`).join("")}</div>`;
    }

    function renderTagFilterRow(){
      if(!els.tagFilterRow) return;
      const counts = tagCounts();
      if(counts.size === 0){
        els.tagFilterRow.style.display = "none";
        return;
      }
      const tags = Array.from(counts.keys()).sort((a,b) => counts.get(b) - counts.get(a) || a.localeCompare(b));
      els.tagFilterRow.innerHTML = tags.map(tag => `
        <button type="button" class="tag-chip${activeTagFilters.has(tag) ? " active" : ""}" data-tag="${escapeAttr(tag)}">${escapeHTML(tag)} (${counts.get(tag)})</button>
      `).join("");
      els.tagFilterRow.style.display = "flex";
    }

    function renderArchiveBar(archivedList){
      if(!els.archiveBar || !els.archivedSection) return;
      if(archivedList.length === 0){
        els.archiveBar.style.display = "none";
        els.archivedSection.style.display = "none";
        return;
      }
      els.archiveBar.style.display = "flex";
      els.archiveBar.innerHTML = `
        <span>${archivedList.length} archived application${archivedList.length===1?"":"s"} hidden (terminal status, untouched ${ARCHIVE_DAYS}+ days)</span>
        <button type="button" data-archive-toggle>${showArchived ? "Hide archived" : "Show archived"}</button>
      `;
      if(showArchived){
        els.archivedSection.style.display = "block";
        els.archivedSection.innerHTML = `<h2>Archived (${archivedList.length})</h2>`;
        const stack = document.createElement("div");
        stack.className = "stack";
        for(const it of archivedList){
          stack.appendChild(stackItemEl(it, normalizeStatus(it.status)));
        }
        els.archivedSection.appendChild(stack);
      }else{
        els.archivedSection.style.display = "none";
      }
    }

    function toggleStats(){
      const showing = els.statsPanel.style.display !== "none";
      if(showing){
        els.statsPanel.style.display = "none";
        els.statsBtn.setAttribute("aria-expanded", "false");
      }else{
        els.statsPanel.style.display = "flex";
        els.statsBtn.setAttribute("aria-expanded", "true");
        renderStats();
      }
    }

    function computeStats(){
      const applications = items.filter(it => !PRE_APPLICATION_STATUSES.includes(normalizeStatus(it.status)));
      const responded = applications.filter(it => it.firstRespondedAt);
      const responseDays = responded
        .map(it => daysBetween(it.recordedDate, it.firstRespondedAt))
        .filter(d => d !== null && d >= 0);
      const avgDays = responseDays.length
        ? Math.round(responseDays.reduce((a,b) => a+b, 0) / responseDays.length)
        : null;
      return {
        total: applications.length,
        responded: responded.length,
        rate: applications.length ? Math.round((responded.length / applications.length) * 100) : 0,
        avgDays,
      };
    }

    function renderStats(){
      if(!els.statsPanel || els.statsPanel.style.display === "none") return;
      const s = computeStats();
      els.statsPanel.innerHTML = `
        <div class="stat"><span class="stat-value">${s.total}</span><span class="stat-label">Total applications</span></div>
        <div class="stat"><span class="stat-value">${s.responded} / ${s.total} (${s.rate}%)</span><span class="stat-label">Response rate</span></div>
        <div class="stat"><span class="stat-value">${s.avgDays === null ? "—" : s.avgDays + "d"}</span><span class="stat-label">Avg days to first response</span></div>
        <div class="stats-caveat">Response = reached Interviewing, Offer, or Accepted after Applied. Based on current data, not a full history log — approximate.</div>
      `;
    }

    function renderTagSuggestions(){
      if(!els.tagSuggestions) return;
      const active = new Set(parseTagsInput(els.tagsInput.value));
      els.tagSuggestions.innerHTML = suggestedTags().map(tag => `
        <button type="button" class="tag-chip${active.has(tag) ? " active" : ""}" data-tag="${escapeAttr(tag)}">${escapeHTML(tag)}</button>
      `).join("");
    }

    function toggleTagInInput(tag){
      const current = parseTagsInput(els.tagsInput.value);
      const idx = current.indexOf(tag);
      if(idx >= 0){ current.splice(idx, 1); } else { current.push(tag); }
      els.tagsInput.value = current.join(", ");
      renderTagSuggestions();
    }

    function staleBadgeHTML(it){
      if(TERMINAL_STATUSES.includes(it.status)) return "";
      const days = daysSince(it.lastContactedAt);
      if(days === null){
        return `<span class="badge-stale" title="No contact logged yet">No contact</span>`;
      }
      return isStale(it)
        ? `<span class="badge-stale" title="${days} days since last contact">${days}d</span>`
        : `<span class="badge-ok" title="${days} days since last contact">${days}d</span>`;
    }

    function openModal(entry){
      els.form.reset();
      refreshStatusOptions(entry?.status || "Applied");
      if(entry){
        els.modalTitle.innerHTML = `
          <div class="app-title">
            <span>${escapeHTML(entry.company || "—")}</span>
            <span class="role">— ${escapeHTML(entry.role || "—")}</span>
          </div>
          <div class="meta">
            ${entry.location ? `<span>${escapeHTML(entry.location)}</span>` : ""}
            ${entry.link ? ` · <a class="link" href="${escapeAttr(entry.link)}" target="_blank" rel="noopener noreferrer">Open</a>` : ""}
          </div>
        `;
      }else{
        els.modalTitle.textContent = "Add application";
      }

      const today = todayISO();
      els.companyInput.value = entry?.company || "";
      els.roleInput.value = entry?.role || "";
      els.locationInput.value = entry?.location || "";
      els.dateInput.value = entry?.recordedDate || today;
      els.lastContactedInput.value = entry?.lastContactedAt || "";
      els.statusInput.value = normalizeStatus(entry?.status || "Applied");
      lastStatusSelection = els.statusInput.value;
      els.linkInput.value = entry?.link || "";
      els.contactNameInput.value = entry?.contactName || "";
      els.contactInfoInput.value = entry?.contactInfo || "";
      els.nextActionDateInput.value = entry?.nextActionDate || "";
      els.nextActionNoteInput.value = entry?.nextActionNote || "";
      els.salaryInput.value = entry?.salary || "";
      els.tagsInput.value = (entry?.tags || []).join(", ");
      renderTagSuggestions();
      els.notesInput.value = entry?.notes || "";
      els.editId.value = entry?.id || "";

      if(typeof els.modal.showModal === "function"){ els.modal.showModal(); }
      else { els.modal.setAttribute("open","true"); }
      setTimeout(() => { els.companyInput.focus(); }, 0);
    }

    function closeModal(){
      if(typeof els.modal.close === "function"){ els.modal.close(); }
      else { els.modal.removeAttribute("open"); }
    }

    function onSave(ev){
      ev.preventDefault();
      const company = els.companyInput.value.trim();
      const role = els.roleInput.value.trim();
      if(!company || !role){ alert("Please provide at least Company and Role."); return; }
      const status = normalizeStatus(els.statusInput.value, { allowCreate: true }) || "Applied";
      const existingIdx = items.findIndex(x => x.id === els.editId.value);
      const prior = existingIdx >= 0 ? items[existingIdx] : null;
      const entry = {
        id: els.editId.value || genId(),
        company,
        role,
        location: els.locationInput.value.trim(),
        recordedDate: els.dateInput.value || todayISO(),
        lastContactedAt: els.lastContactedInput.value || "",
        status,
        link: els.linkInput.value.trim(),
        contactName: els.contactNameInput.value.trim(),
        contactInfo: els.contactInfoInput.value.trim(),
        nextActionDate: els.nextActionDateInput.value || "",
        nextActionNote: els.nextActionNoteInput.value.trim(),
        salary: els.salaryInput.value.trim(),
        tags: parseTagsInput(els.tagsInput.value),
        notes: els.notesInput.value.trim(),
        firstRespondedAt: prior?.firstRespondedAt || "",
        lastUpdated: new Date().toISOString()
      };
      if(!entry.firstRespondedAt && RESPONSE_STATUSES.includes(status)){
        entry.firstRespondedAt = todayISO();
      }

      if(existingIdx >= 0){ items[existingIdx] = entry; }
      else { items.push(entry); }

      save();
      render();
      closeModal();
    }

    function exportJSON(){
      const payload = { schema: 2, exportedAt: new Date().toISOString(), data: items };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      download(url, "job-applications.json");
    }
    function importJSON(ev){
      const file = ev.target.files && ev.target.files[0];
      ev.target.value = "";
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const text = String(reader.result || "");
          const obj = JSON.parse(text);
          const arr = Array.isArray(obj) ? obj : (Array.isArray(obj.data) ? obj.data : null);
          if(!arr) throw new Error("Invalid JSON structure.");
          const modeReplace = confirm("Replace existing entries? Click OK to replace, Cancel to merge.");
          if(modeReplace) items = [];
          let count = 0;
          for(const e of arr){
            if(!e || typeof e !== "object") continue;
            if(!e.company || !e.role) continue;
            const entry = {
              id: typeof e.id === "string" && e.id ? e.id : genId(),
              company: String(e.company || "").trim(),
              role: String(e.role || "").trim(),
              location: String(e.location || ""),
              recordedDate: e.recordedDate || e.appliedDate || "",
              lastContactedAt: e.lastContactedAt || "",
              status: normalizeStatus(e.status || "Applied", { allowCreate: true }),
              link: String(e.link || ""),
              contactName: String(e.contactName || ""),
              contactInfo: String(e.contactInfo || ""),
              nextActionDate: e.nextActionDate || "",
              nextActionNote: String(e.nextActionNote || ""),
              salary: String(e.salary || ""),
              tags: Array.isArray(e.tags) ? e.tags.map(sanitizeTagName).filter(Boolean) : [],
              notes: String(e.notes || ""),
              firstRespondedAt: e.firstRespondedAt || "",
              lastUpdated: e.lastUpdated || new Date().toISOString()
            };
            const idx = items.findIndex(x => x.id === entry.id);
            if(idx >= 0) items[idx] = entry; else items.push(entry);
            count++;
          }
          refreshStatusOptions();
          save(); render();
          alert("Imported " + count + " entr" + (count===1?"y":"ies") + ".");
        }catch(err){ alert("Import failed: " + (err && err.message ? err.message : err)); }
      };
      reader.readAsText(file);
    }

    function todayISO(){
      const d = new Date();
      const pad = n => String(n).padStart(2,"0");
      return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
    }
    function genId(){ return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36); }
    function includes(val, q){ return (val || "").toLowerCase().includes(q); }
    function debounce(fn, ms){ let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn.apply(null,args), ms); }; }

    function sanitizeStatusName(name){
      return String(name || "").replace(/\s+/g, " ").trim();
    }

    function sanitizeTagName(name){
      return String(name || "").replace(/\s+/g, " ").trim().toLowerCase();
    }

    function parseTagsInput(str){
      const seen = new Set();
      const tags = [];
      for(const raw of String(str || "").split(",")){
        const tag = sanitizeTagName(raw);
        if(!tag || seen.has(tag)) continue;
        seen.add(tag);
        tags.push(tag);
      }
      return tags;
    }

    // Tags actually present on at least one item, with counts (used for the filter row).
    function tagCounts(){
      const counts = new Map();
      for(const it of items){
        for(const tag of (it.tags || [])){
          counts.set(tag, (counts.get(tag) || 0) + 1);
        }
      }
      return counts;
    }

    // Curated starter tags plus anything currently in use, for the modal's suggestion chips.
    function suggestedTags(){
      return Array.from(new Set([...DEFAULT_TAGS, ...tagCounts().keys()]));
    }

    function buildCustomLookup(){
      customStatusLookup = {};
      for(const status of customStatuses){
        customStatusLookup[status.toLowerCase()] = status;
      }
    }

    function loadCustomStatuses(){
      customStatuses = [];
      try{
        const raw = localStorage.getItem(CUSTOM_STATUS_KEY);
        if(raw){
          const arr = JSON.parse(raw);
          if(Array.isArray(arr)){
            const seen = new Set();
            customStatuses = arr
              .map(sanitizeStatusName)
              .filter(Boolean)
              .filter(status => {
                const key = status.toLowerCase();
                if(DEFAULT_STATUSES.some(def => def.toLowerCase() === key)) return false;
                if(seen.has(key)) return false;
                seen.add(key);
                return true;
              });
          }
        }
      }catch(e){ customStatuses = []; }
      buildCustomLookup();
    }

    function saveCustomStatuses(){
      try{
        localStorage.setItem(CUSTOM_STATUS_KEY, JSON.stringify(customStatuses));
      }catch(e){ /* ignore */ }
    }

    function getStatusList(){
      return DEFAULT_STATUSES.concat(customStatuses);
    }

    function findStatus(name){
      const sanitized = sanitizeStatusName(name);
      if(!sanitized) return null;
      const lower = sanitized.toLowerCase();
      const defaultMatch = DEFAULT_STATUSES.find(s => s.toLowerCase() === lower);
      if(defaultMatch) return defaultMatch;
      return customStatusLookup[lower] || null;
    }

    function addCustomStatus(name, opts = {}){
      const sanitized = sanitizeStatusName(name);
      if(!sanitized) return "";
      const existing = findStatus(sanitized);
      if(existing) return existing;
      customStatuses.push(sanitized);
      const seen = new Set();
      customStatuses = customStatuses.filter(status => {
        const key = status.toLowerCase();
        if(DEFAULT_STATUSES.some(def => def.toLowerCase() === key)) return false;
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      buildCustomLookup();
      saveCustomStatuses();
      if(typeof collapsed[sanitized] !== "boolean"){
        collapsed[sanitized] = true;
        if(!opts.skipCollapseSave) saveColState();
      }else if(!opts.skipCollapseSave){
        saveColState();
      }
      return sanitized;
    }

    function promptForStatus(){
      const name = prompt("Name for the new status column?");
      if(name === null) return null;
      const sanitized = sanitizeStatusName(name);
      if(!sanitized){
        alert("Please enter a valid status name.");
        return false;
      }
      const existing = findStatus(sanitized);
      if(existing){
        alert("That status already exists.");
        return existing;
      }
      const created = addCustomStatus(sanitized);
      if(!created){
        alert("Unable to add that status.");
        return false;
      }
      render();
      return created;
    }

    function refreshStatusOptions(preferred){
      if(!els.statusInput) return;
      const statuses = getStatusList();
      const optionsHtml = statuses
        .map(status => `<option value="${escapeAttr(status)}">${escapeHTML(status)}</option>`)
        .concat(`<option value="${escapeAttr(ADD_STATUS_VALUE)}">Add status…</option>`)
        .join("");
      const previous = typeof preferred === "string" ? preferred : els.statusInput.value;
      let desired = previous ? findStatus(previous) : "";
      if(!desired && typeof previous === "string"){
        const sanitized = sanitizeStatusName(previous);
        desired = findStatus(sanitized);
      }
      if(!desired || !statuses.includes(desired)){
        desired = statuses.includes("Applied") ? "Applied" : (statuses[0] || "");
      }
      els.statusInput.innerHTML = optionsHtml;
      if(desired) els.statusInput.value = desired;
      lastStatusSelection = els.statusInput.value;
    }

    function normalizeStatus(s, options = {}){
      const raw = sanitizeStatusName(s);
      if(!raw) return "Applied";

      const direct = findStatus(raw);
      if(direct) return direct;

      const v = raw.toLowerCase();
      if(v.startsWith("strong")) return "Strong match";
      if(v.includes("unlikely")) return "Unlikely match";
      if(v.startsWith("prospect")) return "Prospect";
      if(v.startsWith("interview")) return "Interviewing";
      if(v === "offer") return "Offer";
      if(v === "accepted") return "Accepted";
      if(v === "rejected") return "Rejected";
      if(v === "ghosted") return "Ghosted";
      if(v === "withdrawn") return "Withdrawn";
      if(v === "declined") return "Declined";
      if(v === "applied") return "Applied";

      const customMatch = customStatusLookup[v];
      if(customMatch) return customMatch;

      if(options.allowCreate){
        const created = addCustomStatus(raw, { skipCollapseSave: options.skipCollapseSave });
        if(created) return created;
      }

      return "Applied";
    }

    function escapeHTML(s){
      return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }
    function escapeAttr(s){
      return escapeHTML(s).replace(/"/g, '&quot;');
    }

    function download(url, filename){
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
    }

    function makeDraggable(el, id){
      el.setAttribute("draggable","true");
      el.addEventListener("dragstart", (e) => {
        try{ e.dataTransfer.setData("text/plain", id); }catch(_){}
        if(e.dataTransfer) e.dataTransfer.effectAllowed = "move";
        el.setAttribute("aria-grabbed","true");
      });
      el.addEventListener("dragend", () => { el.removeAttribute("aria-grabbed"); });
    }
    function wireDropZone(colEl, status){
      const onDragOver = (e) => {
        e.preventDefault();
        if(e.dataTransfer) e.dataTransfer.dropEffect = "move";
        colEl.classList.add("drag-over");
      };
      const onDragLeave = () => { colEl.classList.remove("drag-over"); };
      const onDrop = (e) => {
        e.preventDefault();
        colEl.classList.remove("drag-over");
        const id = (e.dataTransfer && e.dataTransfer.getData("text/plain")) || "";
        if(!id) return;
        const idx = items.findIndex(x => x.id === id);
        if(idx < 0) return;
        const s = normalizeStatus(status);
        if(items[idx].status !== s){
          items[idx].status = s;
          items[idx].lastUpdated = new Date().toISOString();
          if(!items[idx].firstRespondedAt && RESPONSE_STATUSES.includes(s)){
            items[idx].firstRespondedAt = todayISO();
          }
          save();
          render();
        }
      };
      colEl.addEventListener("dragover", onDragOver);
      colEl.addEventListener("dragenter", onDragOver);
      colEl.addEventListener("dragleave", onDragLeave);
      colEl.addEventListener("drop", onDrop);
    }
  })();
  </script>
</body></html>
